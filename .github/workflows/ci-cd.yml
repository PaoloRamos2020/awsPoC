name: CI/CD — Gestión de la Demanda PoC

on:
  push:
    branches: [develop, release/**, main]
  pull_request:
    branches: [develop, main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_ACCOUNT: 145292398795
  AWS_ROLE_ARN: arn:aws:iam::145292398795:role/demanda-poc-github-actions-role

jobs:

  # ─── DETERMINAR AMBIENTE ────────────────────────────────────────────────────
  set-environment:
    name: Set Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      prefix:      ${{ steps.env.outputs.prefix }}
      s3_bucket:   ${{ steps.env.outputs.s3_bucket }}
    steps:
      - name: Determine environment from branch
        id: env
        run: |
          BRANCH="${{ github.ref_name }}"
          if [[ "$BRANCH" == "main" ]]; then
            ENV="prod"
          elif [[ "$BRANCH" == release/* ]]; then
            ENV="qa"
          else
            ENV="dev"
          fi
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "prefix=demanda-$ENV" >> $GITHUB_OUTPUT
          echo "s3_bucket=demanda-$ENV-frontend-145292398795" >> $GITHUB_OUTPUT
          echo "Ambiente detectado: $ENV (rama: $BRANCH)"

  # ─── TEST BACKEND ───────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: set-environment
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and test
        working-directory: backend
        run: |
          npm install
          npm test --if-present

  # ─── SECURITY SCAN ──────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [set-environment, test-backend]
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build image for scanning
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          PREFIX: ${{ needs.set-environment.outputs.prefix }}
        run: docker build -t $ECR_REGISTRY/$PREFIX-backend:scan ./backend
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.ECR_ACCOUNT }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ needs.set-environment.outputs.prefix }}-backend:scan'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  # ─── TERRAFORM PLAN ─────────────────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan (${{ needs.set-environment.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [set-environment, test-backend]
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
      - name: Create lambda zip
        run: cd lambda && zip lambda.zip index.js
      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check
      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="key=${{ needs.set-environment.outputs.environment }}/terraform.tfstate"
      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate
      - name: Terraform Plan
        working-directory: terraform
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_environment: ${{ needs.set-environment.outputs.environment }}
        run: terraform plan -out=tfplan
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: terraform-artifacts-${{ needs.set-environment.outputs.environment }}
          path: |
            terraform/tfplan
            lambda/lambda.zip
          retention-days: 1

  # ─── TERRAFORM APPLY (dev / qa — automático) ────────────────────────────────
  terraform-apply:
    name: Terraform Apply (${{ needs.set-environment.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [set-environment, terraform-plan, security-scan]
    if: needs.set-environment.outputs.environment != 'prod'
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: terraform-artifacts-${{ needs.set-environment.outputs.environment }}
          path: .
      - name: Show downloaded structure
        run: find . -name tfplan -o -name lambda.zip | head -20
      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="key=${{ needs.set-environment.outputs.environment }}/terraform.tfstate"
      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_environment: ${{ needs.set-environment.outputs.environment }}
        run: terraform apply -auto-approve tfplan

  # ─── TERRAFORM APPLY (prod — requiere aprobación manual) ────────────────────
  terraform-apply-prod:
    name: Terraform Apply (prod) 🔒
    runs-on: ubuntu-latest
    needs: [set-environment, terraform-plan, security-scan]
    if: needs.set-environment.outputs.environment == 'prod'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: terraform-artifacts-prod
          path: .
      - name: Show downloaded structure
        run: find . -name tfplan -o -name lambda.zip | head -20
      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="key=prod/terraform.tfstate"
      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD_PROD }}
          TF_VAR_environment: prod
        run: terraform apply -auto-approve tfplan

  # ─── BUILD & PUSH ECR ───────────────────────────────────────────────────────
  build-push-ecr:
    name: Build & Push ECR (${{ needs.set-environment.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [set-environment, terraform-apply, terraform-apply-prod]
    if: always() && (needs.terraform-apply.result == 'success' || needs.terraform-apply-prod.result == 'success')
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          PREFIX:       ${{ needs.set-environment.outputs.prefix }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$PREFIX-backend:$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/$PREFIX-backend:$IMAGE_TAG
          docker tag  $ECR_REGISTRY/$PREFIX-backend:$IMAGE_TAG \
                      $ECR_REGISTRY/$PREFIX-backend:latest
          docker push $ECR_REGISTRY/$PREFIX-backend:latest
          echo "Imagen publicada: $ECR_REGISTRY/$PREFIX-backend:$IMAGE_TAG"

  # ─── DEPLOY FRONTEND ────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (${{ needs.set-environment.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [set-environment, terraform-apply, terraform-apply-prod]
    if: always() && (needs.terraform-apply.result == 'success' || needs.terraform-apply-prod.result == 'success')
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.BACKEND_URL }}
          VITE_ENV:     ${{ needs.set-environment.outputs.environment }}
        run: |
          npm install
          npm run build
      - name: Deploy to S3
        run: |
          aws s3 sync frontend/build/ s3://${{ needs.set-environment.outputs.s3_bucket }} --delete
          echo "Frontend desplegado en s3://${{ needs.set-environment.outputs.s3_bucket }}"
      - name: Invalidate CloudFront
        run: |
          CF_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='Demanda ${{ needs.set-environment.outputs.environment }} Frontend'].Id" \
            --output text)
          aws cloudfront create-invalidation --distribution-id $CF_ID --paths "/*"
          echo "Cache invalidado en CloudFront: $CF_ID"
