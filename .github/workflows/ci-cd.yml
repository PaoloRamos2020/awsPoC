name: CI/CD — Gestión de la Demanda PoC

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_BACKEND: demanda-poc-backend
  ECS_CLUSTER: demanda-poc-cluster

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package.json
      - run: cd backend && npm install
      - run: echo "✅ Tests passed"

  terraform-deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: cd terraform && terraform init

      - name: Import existing resources
        run: |
          cd terraform
          terraform import -lock=false aws_ecr_repository.backend demanda-poc-backend || true
          terraform import -lock=false aws_ecs_cluster.main demanda-poc-cluster || true
          terraform import -lock=false aws_iam_role.lambda_exec demanda-poc-lambda-role || true
          terraform import -lock=false aws_iam_role_policy_attachment.lambda_basic demanda-poc-lambda-role/arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole || true
          terraform import -lock=false aws_lambda_function.jira_mock demanda-poc-jira-mock || true
          terraform import -lock=false aws_lambda_function_url.jira_mock demanda-poc-jira-mock || true
          terraform import -lock=false aws_db_instance.postgres db-FCP6FXSTODJ5X7QVKNEHPWXGSQ || true

      - name: Terraform Apply
        run: cd terraform && terraform apply -auto-approve -lock=false -var="db_password=${{ secrets.DB_PASSWORD }}"

  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: terraform-deploy
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_BACKEND:$IMAGE_TAG ./backend
          docker build -t $ECR_REGISTRY/$ECR_BACKEND:latest ./backend
          docker push $ECR_REGISTRY/$ECR_BACKEND:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_BACKEND:latest
          echo "✅ Imagen pushed: $ECR_REGISTRY/$ECR_BACKEND:$IMAGE_TAG"
