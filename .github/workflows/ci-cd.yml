name: CI/CD — Gestión de la Demanda PoC

on:
  push:
    branches: [main, release, develop]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: demanda-poc-backend
  AWS_ROLE_ARN: arn:aws:iam::145292398795:role/demanda-poc-github-actions-role

jobs:
  set-environment:
    name: Set Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      prefix: ${{ steps.set-env.outputs.prefix }}
      s3_bucket: ${{ steps.set-env.outputs.s3_bucket }}
      cf_distribution: ${{ steps.set-env.outputs.cf_distribution }}
    steps:
      - name: Determine environment
        id: set-env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "prefix=prod" >> $GITHUB_OUTPUT
            echo "s3_bucket=demanda-poc-frontend-145292398795" >> $GITHUB_OUTPUT
            echo "cf_distribution=E34QI9GBHOBS0Z" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "release" ]; then
            echo "environment=qa" >> $GITHUB_OUTPUT
            echo "prefix=qa" >> $GITHUB_OUTPUT
            echo "s3_bucket=demanda-qa-frontend-145292398795" >> $GITHUB_OUTPUT
            echo "cf_distribution=QA_CF_ID" >> $GITHUB_OUTPUT
          else
            echo "environment=development" >> $GITHUB_OUTPUT
            echo "prefix=dev" >> $GITHUB_OUTPUT
            echo "s3_bucket=demanda-dev-frontend-145292398795" >> $GITHUB_OUTPUT
            echo "cf_distribution=DEV_CF_ID" >> $GITHUB_OUTPUT
          fi

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: set-environment
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and test
        working-directory: backend
        run: |
          npm install
          npm test --if-present

  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build image for scanning
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:scan ./backend
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:scan'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [test-backend, set-environment]
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
      - name: Create lambda zip
        run: cd lambda && zip lambda.zip index.js
      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check
      - name: Terraform Init
        working-directory: terraform
        run: terraform init
      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate
      - name: Terraform Plan
        working-directory: terraform
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_environment: ${{ needs.set-environment.outputs.prefix }}
        run: terraform plan -out=tfplan
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: terraform-artifacts
          path: |
            terraform/tfplan
            lambda/lambda.zip
          retention-days: 1

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [terraform-plan, security-scan, set-environment]
    environment: ${{ needs.set-environment.outputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: terraform-artifacts
          path: .
      - name: Show artifact structure
        run: find . -name tfplan -o -name lambda.zip
      - name: Terraform Init
        working-directory: terraform
        run: terraform init
      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_environment: ${{ needs.set-environment.outputs.prefix }}
        run: terraform apply -auto-approve tfplan

  build-push-ecr:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [terraform-apply, set-environment]
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          ENV_PREFIX: ${{ needs.set-environment.outputs.prefix }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$ENV_PREFIX-$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$ENV_PREFIX-$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$ENV_PREFIX-$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:$ENV_PREFIX-latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$ENV_PREFIX-latest

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [terraform-apply, set-environment]
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_LAMBDA_URL: https://3yaj0v3c10.execute-api.us-east-1.amazonaws.com/
          REACT_APP_ENVIRONMENT: ${{ needs.set-environment.outputs.prefix }}
        run: |
          npm install
          npm run build
      - name: Deploy to S3
        run: aws s3 sync frontend/build/ s3://${{ needs.set-environment.outputs.s3_bucket }} --delete
      - name: Invalidate CloudFront
        if: ${{ needs.set-environment.outputs.cf_distribution != 'DEV_CF_ID' && needs.set-environment.outputs.cf_distribution != 'QA_CF_ID' }}
        run: aws cloudfront create-invalidation --distribution-id ${{ needs.set-environment.outputs.cf_distribution }} --paths "/*"
